<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信息匹配系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-right: 10px;
            border-radius: 2px;
        }

        .text-pair {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }

        .text-pair:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
        }

        .text-pair-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .pair-number {
            font-weight: bold;
            color: #667eea;
            font-size: 16px;
        }

        .remove-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .remove-btn:hover {
            background: #ff3344;
            transform: translateY(-2px);
        }

        .text-input-group {
            margin-bottom: 10px;
        }

        .text-input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .text-input-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .text-input-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .results-section {
            margin-top: 30px;
            display: none;
        }

        .results-section.show {
            display: block;
        }

        .result-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .result-card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .result-card.similar {
            border-left: 5px solid #28a745;
        }

        .result-card.not-similar {
            border-left: 5px solid #ff4757;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .result-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .badge-similar {
            background: #d4edda;
            color: #155724;
        }

        .badge-not-similar {
            background: #f8d7da;
            color: #721c24;
        }

        .result-sentences {
            margin-bottom: 10px;
        }

        .sentence-item {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
            margin-bottom: 8px;
        }

        .sentence-label {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 信息匹配系统</h1>
            <p>智能判断文本相似度 - 基于 AI 大模型</p>
        </div>

        <div class="content">
            <div class="input-section">
                <div class="section-title">输入文本对</div>
                <div id="textPairs"></div>
                
                <div class="button-group">
                    <button class="btn btn-success" onclick="addTextPair()">➕ 添加文本对</button>
                    <button class="btn btn-secondary" onclick="loadExamples()">📋 加载示例</button>
                    <button class="btn btn-primary" onclick="submitMatch()">🚀 开始匹配</button>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在分析文本相似度...</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <div class="results-section" id="resultsSection">
                <div class="section-title">匹配结果</div>
                <div class="stats" id="stats"></div>
                <div id="results"></div>
            </div>
        </div>
    </div>

    <script>
        let pairCount = 0;

        function addTextPair(sentence1 = '', sentence2 = '') {
            pairCount++;
            const container = document.getElementById('textPairs');
            const pairDiv = document.createElement('div');
            pairDiv.className = 'text-pair';
            pairDiv.id = `pair-${pairCount}`;
            
            pairDiv.innerHTML = `
                <div class="text-pair-header">
                    <span class="pair-number">文本对 #${pairCount}</span>
                    ${pairCount > 1 ? `<button class="remove-btn" onclick="removeTextPair(${pairCount})">删除</button>` : ''}
                </div>
                <div class="text-input-group">
                    <label>句子 1:</label>
                    <textarea placeholder="请输入第一个句子..." class="sentence1">${sentence1}</textarea>
                </div>
                <div class="text-input-group">
                    <label>句子 2:</label>
                    <textarea placeholder="请输入第二个句子..." class="sentence2">${sentence2}</textarea>
                </div>
            `;
            
            container.appendChild(pairDiv);
        }

        function removeTextPair(id) {
            const pair = document.getElementById(`pair-${id}`);
            if (pair) {
                pair.remove();
            }
        }

        function loadExamples() {
            const examples = [
                ['股票市场今日大涨，投资者乐观。', '持续上涨的市场让投资者感到满意。'],
                ['油价大幅下跌，能源公司面临挑战。', '未来智能城市的建设趋势愈发明显。'],
                ['利率上升，影响房地产市场。', '高利率对房地产有一定冲击。'],
                ['我爱你', '我恨你'],
                ['我爱你', '我喜欢你']
            ];

            const container = document.getElementById('textPairs');
            container.innerHTML = '';
            pairCount = 0;

            examples.forEach((example, index) => {
                addTextPair(example[0], example[1]);
            });
        }

        async function submitMatch() {
            const pairs = document.querySelectorAll('.text-pair');
            const texts = [];

            pairs.forEach(pair => {
                const sentence1 = pair.querySelector('.sentence1').value.trim();
                const sentence2 = pair.querySelector('.sentence2').value.trim();
                
                if (sentence1 && sentence2) {
                    texts.push([sentence1, sentence2]);
                }
            });

            if (texts.length === 0) {
                showError('请至少输入一个完整的文本对！');
                return;
            }

            hideError();
            showLoading(true);
            hideResults();

            try {
                const response = await fetch('http://localhost:5000/api/match', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ texts: texts })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || '请求失败');
                }

                displayResults(data.data);
            } catch (error) {
                showError('请求失败: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function displayResults(results) {
            const resultsSection = document.getElementById('resultsSection');
            const resultsContainer = document.getElementById('results');
            const statsContainer = document.getElementById('stats');

            resultsContainer.innerHTML = '';
            
            let similarCount = 0;
            let notSimilarCount = 0;

            results.forEach((result, index) => {
                const isSimilar = result.match_result.includes('相似') && !result.match_result.includes('不相似');
                if (isSimilar) {
                    similarCount++;
                } else {
                    notSimilarCount++;
                }

                const resultCard = document.createElement('div');
                resultCard.className = `result-card ${isSimilar ? 'similar' : 'not-similar'}`;
                
                resultCard.innerHTML = `
                    <div class="result-header">
                        <span class="pair-number">结果 #${index + 1}</span>
                        <span class="result-badge ${isSimilar ? 'badge-similar' : 'badge-not-similar'}">
                            ${result.match_result}
                        </span>
                    </div>
                    <div class="result-sentences">
                        <div class="sentence-item">
                            <div class="sentence-label">句子 1:</div>
                            <div>${result.sentence1}</div>
                        </div>
                        <div class="sentence-item">
                            <div class="sentence-label">句子 2:</div>
                            <div>${result.sentence2}</div>
                        </div>
                    </div>
                `;
                
                resultsContainer.appendChild(resultCard);
            });

            statsContainer.innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${results.length}</div>
                    <div class="stat-label">总文本对数</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #28a745 0%, #20c997 100%);">
                    <div class="stat-number">${similarCount}</div>
                    <div class="stat-label">相似文本对</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);">
                    <div class="stat-number">${notSimilarCount}</div>
                    <div class="stat-label">不相似文本对</div>
                </div>
            `;

            resultsSection.classList.add('show');
        }

        function showLoading(show) {
            const loading = document.getElementById('loading');
            if (show) {
                loading.classList.add('show');
            } else {
                loading.classList.remove('show');
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function hideError() {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.classList.remove('show');
        }

        function hideResults() {
            const resultsSection = document.getElementById('resultsSection');
            resultsSection.classList.remove('show');
        }

        window.onload = function() {
            addTextPair();
        };
    </script>
</body>
</html>
